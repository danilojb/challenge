apiVersion: v1
kind: Secret
metadata:
  name: target-db-secret
  namespace: tech-challenge-db
type: Opaque
data:
  # postgres-password: target
  password: dGFyZ2V0
  # username: target
  username: dGFyZ2V0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: target-db-init
  namespace: tech-challenge-db
data:
  init.sql: |
    -- Consulte o arquivo db/init.sql da pasta targeting-service
    -- Este é um espaço reservado para seus scripts de inicialização
    CREATE TABLE IF NOT EXISTS targets (
      id SERIAL PRIMARY KEY,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-db
  namespace: tech-challenge-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-db
  template:
    metadata:
      labels:
        app: target-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: target-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: target-db-secret
                  key: password
            - name: POSTGRES_DB
              value: targetdb
          
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U target
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U target
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          volumeMounts:
            - name: target-db-storage
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      
      volumes:
        - name: target-db-storage
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: target-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: target-db
  namespace: tech-challenge-db
spec:
  selector:
    app: target-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
