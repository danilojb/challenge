          - path: /targets
            pathType: Prefix
            backend:
              service:
                name: targeting-service
                port:
                  number: 8000
          - path: /targeting
            pathType: Prefix
            backend:
              service:
                name: targeting-service
                port:
                  number: 8000
          - path: /evaluations
            pathType: Prefix
            backend:
              service:
                name: evaluation-service
                port:
                  number: 8000
          - path: /evaluate
            pathType: Prefix
            backend:
              service:
