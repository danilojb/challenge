apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: tech-challenge
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.techchallenge.local
      secretName: api-tls-secret
  rules:
    # Auth Service
    - host: api.techchallenge.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8000
    
    # Flag Service
    - host: api.techchallenge.local
      http:
        paths:
          - path: /flags
            pathType: Prefix
            backend:
              service:
                name: flag-service
                port:
                  number: 8000
          - path: /flag
            pathType: Prefix
            backend:
              service:
                name: flag-service
                port:
                  number: 8000
    
    # Targeting Service
    - host: api.techchallenge.local
      http:
        paths:
          - path: /targets
            pathType: Prefix
            backend:
              service:
                name: targeting-service
                port:
                  number: 8000
          - path: /targeting
            pathType: Prefix
            backend:
              service:
                name: targeting-service
                port:
                  number: 8000
    
    # Evaluation Service
    - host: api.techchallenge.local
      http:
        paths:
          - path: /evaluations
            pathType: Prefix
            backend:
              service:
                name: evaluation-service
                port:
                  number: 8000
          - path: /evaluate
            pathType: Prefix
            backend:
              service:
                name: evaluation-service
                port:
                  number: 8000
    
    # Analytics Service
    - host: api.techchallenge.local
      http:
        paths:
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 8000
---
# Ingress alternativa com IP específico (se não usar HTTPS)
